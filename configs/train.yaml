# @package _global_

# specify here default configuration
# order of defaults determines the order in which configs override each other
defaults:
  - _self_
  - datamodule: imagenet_train
  - module: vit_s_16
  - trainer: imagenet_vit_s_16
  - logger: many_loggers
  - callbacks: default
  - paths: default
  - extras: default
  - hydra: default
  - codecarbon: default
  - experiment: null

  # config for hyperparameter optimization
  - hparams_search: null

  # debugging config (enable through command line, e.g. `python train.py debug=default)
  - debug: null

# experiment name, determines output directory path
team_name: "TODO"
experiment_name: "baseline"

# tags to help you identify your experiments
# you can overwrite this in experiment configs
# overwrite from command line with `uv run src/train.py tags="[first_tag, second_tag]"`

# First tag options: explore, baseline, ablate, hyperparam, final, <custom tag>
# Second tag options: train, pre-train, post-train, debug, <custom tag>
tags: ["baseline", "train"]

# simply provide checkpoint path to resume training
ckpt_path: null

# seed for random number generators in pytorch, numpy and python.random
seed: 0

# some optimization
trainer:
  precision: 16-mixed

module:
  compile: True
