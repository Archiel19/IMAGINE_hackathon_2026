# @package _global_

# Direct jump from 96x96 to 224x224 at switch_epoch.
# Batch size and learning rate scale together (reference: batch 512, lr 1e-3 at 224x224).
# uv run src/train.py experiment=progressive_res_direct

defaults:
  - override /trainer: imagenet_vit_s_16
  - override /callbacks: default

seed: 42

module:
  compile: false

datamodule:
  train_crop_size: 96

callbacks:
  progressive_resolution:
    _target_: src.callbacks.progressive_resolution.ProgressiveResolutionCallback
    mode: direct
    full_crop_size: 224
    switch_epoch: 15
    match_tokens: true
    reference_batch_size: 512

  model_checkpoint:
    every_n_epochs: 1

experiment_name: "progressive_res_direct_96_to_224"
tags: ["ablate", "train"]
