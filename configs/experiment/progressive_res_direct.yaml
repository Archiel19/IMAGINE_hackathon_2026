# @package _global_

# Direct jump from 96x96 to 224x224 at switch_epoch
# uv run src/train.py experiment=progressive_res_direct

defaults:
  - override /trainer: imagenet_vit_s_16
  - override /callbacks: default

seed: 42

module:
  compile: false

datamodule:
  train_crop_size: 96

callbacks:
  progressive_resolution:
    _target_: src.callbacks.progressive_resolution.ProgressiveResolutionCallback
    mode: direct
    full_crop_size: 224
    switch_epoch: 5

experiment_name: "progressive_res_direct_96_to_224"
tags: ["ablate", "train"]
