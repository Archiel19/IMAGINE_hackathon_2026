# @package _global_

# to execute this experiment run:
# uv run src/train.py experiment=low_res_compressed_data

defaults:
  - override /trainer: imagenet_vit_s_16
  - override /callbacks: default

seed: 42

# Put those parameters in your experiment config
# 1st phase: Dataset is resized + center cropped to 96x96 + JPEG compressed to 50 quality (w/o Resize/Crop augmentations)
# 2nd phase: Dataset is JPEG compressed to 50 quality (w/ Resize/Crop augmentations)
# ------------------------------------------------------------
data:
  resize_size: 112
  crop_size: 96
  jpeg_quality: 50 
  overwrite: true # false = if resized/compressed data already exists, use it, true = overwrite it
  # (use true to accurately measure energy usage!)
  switch_epoch: 17 # Switch to phase 2 at this epoch
  phase2_num_workers: 8
  phase2_prefetch_factor: 2

datamodule:
  skip_resize_crop: true

callbacks:
  compressed_data_phase_switch:
    _target_: src.callbacks.compressed_data_phase_switch.CompressedDataPhaseSwitchCallback
    switch_epoch: ${data.switch_epoch}
# ------------------------------------------------------------

experiment_name: "low_res_compressed_2_compressed"
tags: ["data", "train"]
